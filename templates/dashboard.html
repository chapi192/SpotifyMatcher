{% extends "base.html" %}

{% block content %}

<div class="dashboard-header">

    <div class="dashboard-left">

        <h2>Your Playlists</h2>

        <div class="dashboard-actions">

            <div class="playlist-sort-wrapper">

                <button id="sortButton" class="playlist-sort-btn">
                    Alphabetical
                </button>

                <div id="sortMenu" class="playlist-sort-menu">

                    <div data-sort="alpha">Alphabetical</div>
                    <div data-sort="count">Track Count</div>
                    <div data-sort="color">Cover Color</div>

                </div>

            </div>

            <input
                type="text"
                id="playlistSearch"
                placeholder="Search playlists..."
                class="playlist-search"
            />

        </div>

    </div>

    <button class="btn" onclick="deselectAll()">
        Deselect All
    </button>

</div>

<hr style="margin:10px 0; opacity:0.2;">

<div class="playlist-grid" id="playlistContainer">
    <div id="dashboardLoader" class="dashboard-loader">
        <div class="loader-text" id="loaderText">Pulling playlists...</div>
        <div class="loader-spinner"></div>
    </div>
</div>

<div id="hiddenSection">

    <hr style="margin:40px 0; opacity:0.2;">

    <h3 style="opacity:0.7;">Hidden Playlists</h3>
    <div class="playlist-grid" id="hiddenContainer"></div>

</div>

<script>
let searchQuery = "";
let sortMode = "alpha";
let hoverCooldownId = null;
let cooldownUntilById = {};
let selectionTimeout = null;
let hiddenSet = new Set();
let allPlaylists = [];
let selectedSet = new Set();

function showLoader(text) {
    const loader = document.getElementById("dashboardLoader");
    const msg = document.getElementById("loaderText");

    if (msg) msg.textContent = text;
    if (loader) loader.style.display = "flex";
}

function hideLoader() {
    const loader = document.getElementById("dashboardLoader");
    if (loader) loader.style.display = "none";

    const hiddenSection = document.getElementById("hiddenSection");
    if (hiddenSection) hiddenSection.style.display = "block";
}

async function loadPlaylists() {

    showLoader("Pulling playlists...");

    const [playlistRes, selectionRes] = await Promise.all([
        fetch("/api/playlists"),
        fetch("/api/selection")
    ]);

    const playlistData = await playlistRes.json();
    const selectionData = await selectionRes.json();

    showLoader("Analyzing cover colors...");

    allPlaylists = playlistData.playlists;

    selectedSet = new Set(selectionData.selected_ids || []);
    hiddenSet = new Set(selectionData.hidden_ids || []);

    sessionStorage.setItem("cachedPlaylists", JSON.stringify(allPlaylists));

    // compute hues
    await Promise.all(
        allPlaylists.map(p => computePlaylistHue(p))
    );

    // single render
    renderPlaylists();

    hideLoader();

    refreshNavGating();
}

function rgbToHsl(r, g, b){

    r /= 255;
    g /= 255;
    b /= 255;

    const max = Math.max(r,g,b);
    const min = Math.min(r,g,b);
    const d = max - min;

    let h = 0;
    let s = 0;
    const l = (max + min) / 2;

    if (d !== 0){

        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

        switch(max){

            case r: h = (g - b) / d + (g < b ? 6 : 0); break;
            case g: h = (b - r) / d + 2; break;
            case b: h = (r - g) / d + 4; break;

        }

        h /= 6;
    }

    return {
        hue: h * 360,
        sat: s,
        light: l
    };

}

async function computePlaylistHue(playlist){

    if (!playlist.image){
        playlist.colorGroup = "gray";
        playlist.hue = 0;
        playlist.hueBucket = 0;
        return;
    }

    const img = new Image();
    img.crossOrigin = "Anonymous";
    img.src = playlist.image;

    await img.decode();

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 20;
    canvas.height = 20;

    ctx.drawImage(img,0,0,20,20);

    const data = ctx.getImageData(0,0,20,20).data;

    let hues = [];
    let grayPixels = 0;
    let totalPixels = 0;
    let lightTotal = 0;

    for(let i=0;i<data.length;i+=4){

        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];

        const hsl = rgbToHsl(r,g,b);

        totalPixels++;
        lightTotal += hsl.light;

        if(hsl.sat < 0.15){
            grayPixels++;
            continue;
        }

        hues.push(hsl.hue);

    }

    const avgLight = lightTotal / totalPixels;

    if(avgLight > 0.90){
        playlist.colorGroup = "white";
        playlist.hue = 0;
        playlist.hueBucket = 0;
        return;
    }

    if(avgLight < 0.10){
        playlist.colorGroup = "black";
        playlist.hue = 0;
        playlist.hueBucket = 0;
        return;
    }

    if(grayPixels / totalPixels > 0.70){
        playlist.colorGroup = "gray";
        playlist.hue = 0;
        playlist.hueBucket = 0;
        return;
    }

    if(hues.length === 0){
        playlist.colorGroup = "gray";
        playlist.hue = 0;
        playlist.hueBucket = 0;
        return;
    }

    const avgHue = hues.reduce((a,b)=>a+b,0) / hues.length;

    let variance = 0;

    for(const h of hues){
        variance += Math.abs(h - avgHue);
    }

    variance /= hues.length;

    if(variance > 80){
        playlist.colorGroup = "noisy";
        playlist.hue = avgHue;
        playlist.hueBucket = 0;
        return;
    }

    playlist.colorGroup = "color";
    playlist.hue = avgHue;
    playlist.hueBucket = Math.floor(avgHue / 20);

}

document.getElementById("playlistSearch").addEventListener("input", (e) => {
    searchQuery = e.target.value.toLowerCase();
    renderPlaylists();
});

const sortButton = document.getElementById("sortButton");
const sortMenu = document.getElementById("sortMenu");

sortButton.addEventListener("click", () => {

    const isOpen = sortMenu.style.display === "block";

    sortMenu.style.display = isOpen ? "none" : "block";

});

document.querySelectorAll("#sortMenu div").forEach(option => {

    option.addEventListener("click", () => {

        sortMode = option.dataset.sort;

        sortButton.textContent = option.textContent;

        sortMenu.style.display = "none";

        renderPlaylists();

    });

});

document.addEventListener("click", (e) => {

    if (!sortButton.contains(e.target) && !sortMenu.contains(e.target)) {

        sortMenu.style.display = "none";

    }

});

function renderPlaylists() {
    const container = document.getElementById("playlistContainer");
    const hiddenContainer = document.getElementById("hiddenContainer");

    container.innerHTML = "";
    hiddenContainer.innerHTML = "";

    let playlists = [...allPlaylists];

    // search filter
    if (searchQuery) {
        playlists = playlists.filter(p =>
            p.name.toLowerCase().includes(searchQuery)
        );
    }

    playlists.sort((a, b) => {

        if (a.name.toLowerCase() === "liked songs") return -1;
        if (b.name.toLowerCase() === "liked songs") return 1;

        if (sortMode === "alpha") {
            return a.name.localeCompare(b.name);
        }

        if (sortMode === "count") {
            return b.track_count - a.track_count;
        }

        if (sortMode === "recent") {
            return new Date(b.snapshot_id) - new Date(a.snapshot_id);
        }

        if (sortMode === "color"){

            const order = {
                white:0,
                gray:1,
                color:2,
                black:3,
                noisy:4
            };

            if (a.colorGroup !== b.colorGroup){
                return order[a.colorGroup] - order[b.colorGroup];
            }

            return a.hueBucket - b.hueBucket;

        }

        return 0;
    });

    playlists.forEach((p, index) => {
        const isHidden = hiddenSet.has(p.id);

        const card = document.createElement("div");
        card.className = "playlist-card";

        const now = Date.now();
        if (cooldownUntilById[p.id] && now < cooldownUntilById[p.id]) {
            card.classList.add("cooldown");
        }

        if (hoverCooldownId === p.id) {
            card.classList.add("cooldown");
        }
        card.dataset.id = p.id;

        card.classList.add("fade-start");

        const alreadyAnimated = sessionStorage.getItem("dashboardAnimated");
        if (alreadyAnimated) {
            card.classList.add("no-animate");
        } else {
            card.style.animationDelay = `${index * 60}ms`;
            card.classList.add("animate-in");
        }

        if (!isHidden && selectedSet.has(p.id)) card.classList.add("selected");
        if (isHidden) card.classList.add("hidden-card");

        card.innerHTML = `
            <div class="playlist-row-content">
                <div class="playlist-cover">
                    ${
                        p.image
                            ? `<img src="${p.image}" />`
                            : p.name.toLowerCase() === "liked songs"
                                ? `<img src="https://misc.scdn.co/liked-songs/liked-songs-640.png" />`
                                : `<div class="no-cover">♪</div>`
                    }
                </div>
                <div class="playlist-info">
                    <div class="playlist-name">${p.name}</div>

                    <div class="playlist-meta-row">
                        <div class="playlist-count">${p.track_count} songs</div>
                        <button class="hide-bottom-btn">${isHidden ? "UNHIDE" : "HIDE"}</button>
                    </div>
                </div>
                </div>
            `;

        const hideBtn = card.querySelector(".hide-bottom-btn");

        hideBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if (isHidden) hiddenSet.delete(p.id);
            else {
                hiddenSet.add(p.id);
                selectedSet.delete(p.id);
            }
            renderPlaylists();
            scheduleSelectionUpdate();
        });

        if (!isHidden) {
            card.addEventListener("click", () => {

                const wasSelected = selectedSet.has(p.id);

                if (wasSelected) {
                    selectedSet.delete(p.id);

                    // Set cooldown window for this card
                    cooldownUntilById[p.id] = Date.now() + 800;

                    // Re-render when cooldown ends so class gets removed
                    setTimeout(() => {
                        // Only clear if time truly passed (guards rapid clicking)
                        if (cooldownUntilById[p.id] && Date.now() >= cooldownUntilById[p.id]) {
                            delete cooldownUntilById[p.id];
                            renderPlaylists();
                        }
                    }, 820);

                } else {
                    selectedSet.add(p.id);
                }

                renderPlaylists();
                scheduleSelectionUpdate();
            });
        }

        if (!isHidden) container.appendChild(card);
        else hiddenContainer.appendChild(card);
    });

    if (!sessionStorage.getItem("dashboardAnimated")) {
        sessionStorage.setItem("dashboardAnimated", "true");
    }
}

function deselectAll() {
    selectedSet.clear();
    renderPlaylists();
    scheduleSelectionUpdate();
}

function selectAll() {

    const confirmed = confirm(
        "Select all playlists?\n\nLarge libraries will take a while."
    );

    if (!confirmed) return;

    selectedSet.clear();

    allPlaylists.forEach(p => {
        if (!hiddenSet.has(p.id)) {
            selectedSet.add(p.id);
        }
    });

    renderPlaylists();
    scheduleSelectionUpdate();
}

function scheduleSelectionUpdate() {
    clearTimeout(selectionTimeout);

    // immediate visual disable
    const workspace = document.getElementById("navWorkspace");
    const recs = document.getElementById("navRecommendations");
    if (workspace) workspace.classList.add("nav-disabled");
    if (recs) recs.classList.add("nav-disabled");

    selectionTimeout = setTimeout(sendSelectionUpdate, 50);
}

async function sendSelectionUpdate() {
    await fetch("/api/selection", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            selected_ids: Array.from(selectedSet),
            hidden_ids: Array.from(hiddenSet)
        })
    });

    // show bar only if build actually started
    const progressRes = await fetch("/api/build-progress");
    const progressData = await progressRes.json();

    if (progressData.status === "building") {

        const bar = document.getElementById("globalProgressBar");
        if (bar) bar.style.opacity = "1";

        progressCurrent = 0.02;
        progressTarget = 0.02;
        optimisticCap = 0;
        creepingActive = true;

        checkAndMaybeStartPolling();

    } else {
        resetProgressBar();
    }

    refreshNavGating();
}

loadPlaylists();
</script>

{% endblock %}
