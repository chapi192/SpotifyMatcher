<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/dashboard.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/workspace.css') }}">
    <!-- <link rel="stylesheet" href="{{ url_for('static', path='css/recommendations.css') }}"> -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <title>Spotify Sorter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body class="{% block body_class %}{% endblock %}">

<nav class="navbar">
    <div class="brand">
        <strong>Spotify Sorter</strong>
        <span id="buildCounter" style="margin-left:12px;font-size:12px;opacity:0.7;"></span>
    </div>
    <div id="globalProgressBar" class="global-progress"></div>
    <div class="nav-links">
        <a href="/">Home</a>

        {% if request.session.get("token_info") %}
            <a href="/dashboard">Playlists</a> <!-- Dashboard -->
            <a id="navWorkspace" class="nav-disabled" href="/workspace">Analysis Workspace</a>
            <!-- <a id="navRecommendations" class="nav-disabled" href="/recommendations">Recommendations</a> -->
            <a href="/logout" onclick="handleLogout()">Logout</a>
        {% else %}
            <a href="/login">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>

<!-- treemap plugin THIS VERSION ONLY FOR SOME REASON -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-treemap@2.3.0/dist/chartjs-chart-treemap.min.js"></script>

<script>

// progress bar animation and polling logic
let progressCurrent = 0;
let progressTarget = 0;
let pollingActive = false;
let optimisticCap = 0;
let creepingActive = false;

function handleLogout() {
    sessionStorage.removeItem("cachedPlaylists");
    sessionStorage.removeItem("dashboardAnimated");
}

async function refreshNavGating() {
    const workspace = document.getElementById("navWorkspace");
    if (!workspace) return;

    workspace.classList.add("nav-disabled");

    try {
        const res = await fetch("/api/nav-state");
        const data = await res.json();

        const isBuilding = (data.build_status === "building");
        const hasSelection = !!data.has_selection;

        workspace.classList.toggle("nav-disabled", isBuilding || !hasSelection);

    } catch (e) {
        workspace.classList.add("nav-disabled");
    }
}

function animationLoop() {
    if (creepingActive && optimisticCap > 0) {
        const creepDiff = optimisticCap - progressCurrent;
        if (creepDiff > 0.001) {
            progressCurrent += creepDiff * 0.05;
        }
    }

    const diff = progressTarget - progressCurrent;
    if (Math.abs(diff) > 0.002) {
        progressCurrent += diff * 0.18;
    }

    updateProgressUI(progressCurrent);
    requestAnimationFrame(animationLoop);
}

function updateProgressUI(value) {
    const bar = document.getElementById("globalProgressBar");
    if (!bar) return;

    if (value > 0 && value < 1) bar.style.opacity = "1";
    bar.style.width = (value * 100) + "%";
}

function resetProgressBar() {
    const bar = document.getElementById("globalProgressBar");
    if (!bar) return;

    progressCurrent = 0;
    progressTarget = 0;
    optimisticCap = 0;
    creepingActive = false;

    bar.style.opacity = "0";
    bar.style.width = "0%";
}

async function checkAndMaybeStartPolling() {
    if (pollingActive) return;

    try {
        const res = await fetch("/api/build-progress");
        const data = await res.json();

        if (data.status === "building") {
            pollingActive = true;
            pollBuildProgressLoop();
        }
    } catch (e) {
        // ignore
    }
}

async function pollBuildProgressLoop() {

    try {
        const res = await fetch("/api/build-progress");
        const data = await res.json();

        if (data.status === "complete") {

            pollingActive = false;

            progressCurrent = 1;
            progressTarget = 1;
            updateProgressUI(1);

            setTimeout(() => {
                resetProgressBar();
                refreshNavGating();
            }, 200);

            const counter = document.getElementById("buildCounter");
            if (counter) counter.textContent = "";

            return;
        }

        if (data.status !== "building") {
            pollingActive = false;
            resetProgressBar();
            refreshNavGating();
            return;
        }

        const total = data.total_tracks || 1;
        const current = data.tracks_processed || 0;

        const counter = document.getElementById("buildCounter");
        if (counter) {
            counter.textContent = `${current.toLocaleString()} / ${total.toLocaleString()}`;
        }

        if (optimisticCap === 0) {
            const firstChunk = Math.min(100, total);
            optimisticCap = firstChunk / total;
            creepingActive = true;
        }

        const realProgress = Math.min(current / total, 1);

        if (realProgress > 0) creepingActive = false;

        progressTarget = Math.max(progressTarget, realProgress);

        setTimeout(pollBuildProgressLoop, 120);

    } catch (e) {
        pollingActive = false;
        resetProgressBar();
        refreshNavGating();
    }
}

animationLoop();
refreshNavGating();        // exactly once on load
checkAndMaybeStartPolling();
</script>

</body>
</html>
