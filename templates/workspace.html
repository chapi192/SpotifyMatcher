{% extends "base.html" %}

{% block body_class %}workspace-page{% endblock %}

{% block content %}

<div class="workspace-header">
    <h2>Your Analysis Workspace</h2>
</div>

<div class="ws-layout">

    <!-- LEFT SIDEBAR -->
    <div class="ws-sidebar">

        <!-- METRICS -->
        <div class="ws-controls-vertical">

            <button class="ws-metric-btn active-metric"
                    onclick="setMetric('avg-length', this)">
                Average Length
            </button>

            <button class="ws-metric-btn"
                    onclick="setMetric('popularity', this)">
                Popularity
            </button>

            <button class="ws-metric-btn"
                    onclick="setMetric('artist-frequency', this)">
                Artist Frequency
            </button>

            <button class="ws-metric-btn"
                    onclick="setMetric('release-years', this)">
                Release Years
            </button>

            <button class="ws-metric-btn"
                    onclick="setMetric('playlist-profile', this)">
                Playlist Profile
            </button>

        </div>

        <hr style="margin:18px 0; opacity:0.15;">

        <!-- PLAYLISTS WILL RENDER HERE -->
        <div id="wsPlaylistSection"></div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="ws-main">
        <div class="ws-analytics">
            <div id="wsAnalyticsOutput" class="ws-analytics-inner">
                <p style="opacity:0.65; margin:0;">
                    Select a metric and playlist to begin.
                </p>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let metricCache = {};
let workspaceBuildVersion = null;
let currentMetric = "avg-length";   // default
let currentSelection = "combined";  // default

let wsChartInstance = null;

function resetWsChart() {
    if (wsChartInstance) {
        wsChartInstance.destroy();
        wsChartInstance = null;
    }
}

async function loadWorkspace() {

    const navRes = await fetch("/api/nav-state");
    const navData = await navRes.json();
    workspaceBuildVersion = navData.build_status;

    const res = await fetch("/api/library");
    const data = await res.json();

    if (data.status !== "ready") {
        document.getElementById("wsPlaylistSection").innerHTML =
            "<p>No playlists ready.</p>";
        return;
    }

    renderPlaylistSections(data);

    const selectionCard = document.querySelector(".ws-card-clickable");
    if (selectionCard) selectionCard.classList.add("ws-active");

    maybeRenderAnalytics();
}

function crossfadeAnalytics(html) {
    const container = document.getElementById("wsAnalyticsOutput");

    const oldLayer = container.querySelector(".ws-layer");

    const newLayer = document.createElement("div");
    newLayer.className = "ws-layer new";
    newLayer.innerHTML = html;

    container.appendChild(newLayer);

    // Trigger fade-in for new
    requestAnimationFrame(() => {
        newLayer.classList.add("show");
    });

    if (oldLayer) {
        oldLayer.classList.add("old");
        oldLayer.classList.add("fade");

        setTimeout(() => {
            oldLayer.remove();
        }, 200);
    }
}

function renderPlaylistSections(data) {

    const coverHtml = (imageUrl) => {
        if (imageUrl) {
            return `<div class="playlist-cover"><img src="${imageUrl}" alt="cover"></div>`;
        }
        return `<div class="no-cover">♪</div>`;
    };

    let cards = [];

    // ------------------------------------------------
    // 1. Add "All" option if more than one playlist
    // ------------------------------------------------
    if (data.playlist_count > 1) {
        cards.push(`
            <div class="playlist-card no-animate ws-card-clickable ws-active"
                 onclick="selectWorkspacePlaylist('combined', this)">
                <div class="playlist-row-content">
                    ${coverHtml(null)}
                    <div class="playlist-info">
                        <div class="playlist-name">All Selected</div>
                        <div class="playlist-count">
                            ${data.total_tracks} tracks • ${data.playlist_count} playlists
                        </div>
                    </div>
                </div>
            </div>
        `);
    }

    // ------------------------------------------------
    // 2. Add individual playlists
    // ------------------------------------------------
    data.playlists.forEach(p => {
        cards.push(`
            <div class="playlist-card no-animate ws-card-clickable"
                 onclick="selectWorkspacePlaylist('${p.playlist_id}', this)">
                <div class="playlist-row-content">
                    ${coverHtml(p.image)}
                    <div class="playlist-info">
                        <div class="playlist-name">${escapeHtml(p.playlist_name)}</div>
                        <div class="playlist-count">${p.track_count} tracks</div>
                    </div>
                </div>
            </div>
        `);
    });

    // ------------------------------------------------
    // 3. Render single unified section
    // ------------------------------------------------
    document.getElementById("wsPlaylistSection").innerHTML = `
        <div class="playlist-grid ws-grid-tight">
            ${cards.join("")}
        </div>
    `;

    if (data.playlist_count === 1) {
        currentSelection = data.playlists[0].playlist_id;
    }
}

function setMetric(metric, element) {

    currentMetric = metric;

    // Highlight active metric
    document.querySelectorAll(".ws-metric-btn")
        .forEach(btn => btn.classList.remove("active-metric"));

    if (element) element.classList.add("active-metric");

    maybeRenderAnalytics();
}

function metricCard(label, value) {
    return `
        <div style="
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px;
            border-radius: 12px;
        ">
            <div style="opacity:0.75; font-size:13px;">${label}</div>
            <div style="font-size:22px; font-weight:700; margin-top:4px;">
                ${value}
            </div>
        </div>
    `;
}

function selectWorkspacePlaylist(pid, element) {
    currentSelection = pid;

    document.querySelectorAll(".ws-card-clickable").forEach(card => {
        card.classList.remove("ws-active");
    });

    element.classList.add("ws-active");

    maybeRenderAnalytics();
}

async function maybeRenderAnalytics() {
    if (!currentMetric || !currentSelection) return;

    const inner = document.getElementById("wsAnalyticsOutput");

    // Fetch metric only if not cached
    if (!metricCache[currentMetric]) {
        const res = await fetch(`/api/${currentMetric}`);
        metricCache[currentMetric] = await res.json();
    }

    const payload = metricCache[currentMetric];

    if (payload.status !== "ready") {
        inner.innerHTML = `<p style="opacity:0.7;">No data available.</p>`;
        return;
    }

    const selectedData =
        currentSelection === "combined"
            ? payload.data.combined
            : payload.data.playlists[currentSelection];

    if (!selectedData) {
        inner.innerHTML = `<p style="opacity:0.7;">No profile available.</p>`;
        return;
    }

    // Fade only AFTER data ready
    inner.classList.add("fade-out");

    setTimeout(() => {

        inner.classList.remove("fade-out");

        if (currentMetric === "avg-length") {
            renderAvgLength(selectedData);
        } else if (currentMetric === "popularity") {
            renderPopularity(selectedData);
        } else if (currentMetric === "artist-frequency") {
            renderArtistFrequency(selectedData);
        } else if (currentMetric === "release-years") {
            renderReleaseYears(selectedData);
        } else if (currentMetric === "playlist-profile") {
            renderPlaylistProfile(selectedData);
        }

    }, 90);
}

function renderPlaylistProfile(data) {

    const out = document.getElementById("wsAnalyticsOutput");

    if (!data) {
        out.innerHTML = `<p style="opacity:0.7; margin:0;">No profile data.</p>`;
        resetWsChart();
        return;
    }

    out.innerHTML = `
        <div style="margin-bottom:24px;">
            <div style="font-size:14px; opacity:0.6;">Playlist Identity</div>
            <div style="font-size:42px; font-weight:700;">
                ${escapeHtml(data.top_genre || "Mixed")}
            </div>
            <div style="opacity:0.7;">
                ${data.track_count} tracks • ${data.genre_spread} genres
            </div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;">
            ${metricCard("Top Genre %", data.top_genre_pct + "%")}
            ${metricCard("Dominant Decade", data.dominant_decade || "—")}
            ${metricCard("Diversity Score", data.diversity_score + "%")}
        </div>

        <div style="position:relative; height:260px;">
            <canvas id="wsChart"></canvas>
        </div>
    `;

    renderGenreChart(data.genre_counts);

    setTimeout(() => {
        const out = document.getElementById("wsAnalyticsOutput");
        out.style.minHeight = "";
    }, 0);
}

function renderGenreChart(genreCounts) {

    resetWsChart();

    if (!genreCounts) return;

    const sorted = Object.entries(genreCounts)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,10);

    const labels = sorted.map(g => g[0]);
    const values = sorted.map(g => g[1]);

    const ctx = document.getElementById("wsChart").getContext("2d");

    wsChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels,
            datasets: [{ data: values }]
        },
        options: {
            indexAxis: "y",
            plugins: { legend: { display: false } },
            scales: {
                x: { beginAtZero: true }
            }
        }
    });
}

function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
}

function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.round(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, "0")}`;
}

function renderAvgLength(data) {

    const out = document.getElementById("wsAnalyticsOutput");
    const consistency = getConsistencyLabel(data.std_dev_seconds);
    const timeCommitmentLabel = getTimeCommitmentLabel(data.total_runtime_seconds);
    const flowLabel = getFlowDensityLabel(data.flow_density_pct);

    out.innerHTML = `
        <div class="ws-avg-full">

           <div class="ws-avg-header">

                <div class="ws-avg-title">
                    Average Track Length:
                    <span class="ws-avg-inline-number">
                        ${formatTime(data.average_length_seconds)}
                    </span>
                </div>

                <div class="ws-avg-selection">
                    ${
                        currentSelection === "combined"
                            ? `
                                <span class="ws-selection-name">
                                    All Selected
                                </span>
                                <span class="ws-selection-meta">
                                    ${data.track_count} tracks • ${data.playlist_count || "Multiple"} playlists
                                </span>
                            `
                            : `
                            <a 
                                href="https://open.spotify.com/playlist/${currentSelection}" 
                                target="_blank"
                                class="ws-selection-name ws-selection-link"
                            >
                                ${escapeHtml(data.playlist_name || "")}
                            </a>
                                <span class="ws-selection-meta">
                                    ${data.track_count} tracks
                                </span>
                            `
                    }
                </div>

            </div>

            <div class="ws-chart-overlay-wrap">
                <canvas id="wsChart"></canvas>

                <div class="ws-chart-overlay">

                    <div class="ws-overlay-row">
                        <span>Commitment</span>
                        <span>
                            ${timeCommitmentLabel}
                            (${formatTotalRuntime(data.total_runtime_seconds)})
                        </span>
                    </div>

                    <div class="ws-overlay-row">
                        <span>Flow Density</span>
                        <span>
                            ${flowLabel}
                            (${data.flow_density_pct}%)
                        </span>
                    </div>

                    <div class="ws-overlay-row">
                        <span>Consistency</span>
                        <span>${consistency.label}</span>
                    </div>

                    <div class="ws-overlay-row">
                        <span>Radio %</span>
                        <span>${data.radio_pct}%</span>
                    </div>

                    <div class="ws-overlay-row">
                        <span>Median</span>
                        <span>${formatTime(data.median_length_seconds)}</span>
                    </div>

                    <div class="ws-overlay-row">
                        <span>Longest</span>
                        <div class="ws-overlay-value">
                            <a href="${data.longest_track.url}" target="_blank" class="ws-overlay-title">
                                ${escapeHtml(data.longest_track.name)}
                            </a>
                            <span class="ws-overlay-time">
                                (${formatTime(data.longest_track.seconds)})
                            </span>
                        </div>
                    </div>

                    <div class="ws-overlay-row">
                        <span>Shortest</span>
                        <div class="ws-overlay-value">
                            <a href="${data.shortest_track.url}" target="_blank" class="ws-overlay-title">
                                ${escapeHtml(data.shortest_track.name)}
                            </a>
                            <span class="ws-overlay-time">
                                (${formatTime(data.shortest_track.seconds)})
                            </span>
                        </div>
                    </div>

                </div>

        </div>
    `;

    setTimeout(makeOverlayDraggable, 0);

    renderHistogram(data.durations);

    setTimeout(() => {
        out.style.minHeight = "";
    }, 0);
}

function makeOverlayDraggable() {
    const overlay = document.querySelector(".ws-chart-overlay");
    const container = document.querySelector(".ws-avg-full");

    if (!overlay || !container) return;

    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    const STORAGE_KEY = "wsOverlayPosition";

    // 🔹 Restore saved position
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        const { left, top } = JSON.parse(saved);
        overlay.style.left = left + "px";
        overlay.style.top = top + "px";
        overlay.style.right = "auto";
    }

    overlay.addEventListener("mousedown", (e) => {
        isDragging = true;
        overlay.classList.add("dragging");

        const rect = overlay.getBoundingClientRect();
        offsetX = e.clientX - rect.left;
        offsetY = e.clientY - rect.top;
    });

    document.addEventListener("mousemove", (e) => {
        if (!isDragging) return;

        const containerRect = container.getBoundingClientRect();

        let newLeft = e.clientX - containerRect.left - offsetX;
        let newTop = e.clientY - containerRect.top - offsetY;

        const maxLeft = containerRect.width - overlay.offsetWidth;
        const maxTop = containerRect.height - overlay.offsetHeight;

        newLeft = Math.max(0, Math.min(newLeft, maxLeft));
        newTop = Math.max(0, Math.min(newTop, maxTop));

        overlay.style.left = newLeft + "px";
        overlay.style.top = newTop + "px";
        overlay.style.right = "auto";

        // 🔹 Save position
        localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({ left: newLeft, top: newTop })
        );
    });

    document.addEventListener("mouseup", () => {
        isDragging = false;
        overlay.classList.remove("dragging");
    });
}

function renderHistogram(durations) {

    const bucketSize = 30;
    const buckets = {};

    durations.forEach(sec => {
        const bucket = Math.floor(sec / bucketSize) * bucketSize;
        buckets[bucket] = (buckets[bucket] || 0) + 1;
    });

    const sortedBuckets = Object.keys(buckets)
        .map(Number)
        .sort((a,b)=>a-b);

    const labels = sortedBuckets.map(start => {
        const end = start + bucketSize;
        return `${formatTime(start)}–${formatTime(end)}`;
    });

    const values = sortedBuckets.map(k => buckets[k]);

    const ctx = document.getElementById("wsChart").getContext("2d");
    const inner = document.getElementById("wsAnalyticsOutput");

    // 🔹 If existing chart → shrink first
    if (wsChartInstance) {

        // Shrink bars
        wsChartInstance.data.datasets[0].data =
            wsChartInstance.data.datasets[0].data.map(() => 0);

        wsChartInstance.update();

        setTimeout(() => {

            // Fade card while swapping
            inner.classList.add("fade-out");

            setTimeout(() => {

                wsChartInstance.destroy();

                wsChartInstance = buildHistogram(ctx, labels, values);

                inner.classList.remove("fade-out");
                inner.classList.add("fade-in");

                setTimeout(() => {
                    inner.classList.remove("fade-in");
                }, 120);

            }, 80);

        }, 120);

        return;
    }

    wsChartInstance = buildHistogram(ctx, labels, values);
}
function buildHistogram(ctx, labels, values) {

    return new Chart(ctx, {
        type: "bar",
        data: {
            labels,
            datasets: [{
                data: values,
                backgroundColor: "rgba(29,185,84,0.8)",
                borderColor: "rgba(29,185,84,1)",
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            devicePixelRatio: window.devicePixelRatio || 1,

            animation: {
                duration: 350,
                easing: "easeOutCubic"
            },

            layout: {
                padding: { bottom: 20 }
            },

            plugins: {
                legend: { display: false }
            },

            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { color: "rgba(255,255,255,0.7)" },
                    grid: { color: "rgba(255,255,255,0.05)" }
                },
                x: {
                    ticks: { color: "rgba(255,255,255,0.7)" },
                    grid: { color: "rgba(255,255,255,0.03)" }
                }
            }
        }
    });
}

function renderPopularity(data) {
    const out = document.getElementById("wsAnalyticsOutput");

    // Safety
    if (!data || !data.distribution || data.distribution.length === 0) {
        out.innerHTML = `<p style="opacity:0.7; margin:0;">No popularity data.</p>`;
        resetWsChart();
        return;
    }

    const tiers = data.tier_percentages || {};
    const most = data.most_popular_track;
    const least = data.least_popular_track;

    out.innerHTML = `
        <div style="margin-bottom:24px;">
            <div style="font-size:14px; opacity:0.6;">Average Popularity</div>
            <div style="font-size:42px; font-weight:700;">
                ${data.average_popularity}
            </div>
            <div style="opacity:0.7;">
                ${data.track_count} tracks • Median ${data.median_popularity} • Std Dev ${data.std_dev} • ${data.popularity_spread_label}
            </div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:12px; margin-bottom:18px;">
            ${popTierCard("🔥 Hit", tiers.hit)}
            ${popTierCard("⭐ Popular", tiers.popular)}
            ${popTierCard("🌱 Emerging", tiers.emerging)}
            ${popTierCard("🕳 Underground", tiers.underground)}
        </div>

        <div style="position:relative; height:260px;">
            <canvas id="wsChart"></canvas>
        </div>

        <div style="margin-top:30px; display:grid; gap:14px;">
            <div>
                <strong>Most Popular:</strong>
                <a href="${most.url}" target="_blank">${escapeHtml(most.name)}</a>
                (Score ${most.popularity})
            </div>

            <div>
                <strong>Least Popular:</strong>
                <a href="${least.url}" target="_blank">${escapeHtml(least.name)}</a>
                (Score ${least.popularity})
            </div>

            <div>
                <strong>Read:</strong>
                ${getPopularityRead(data)}
            </div>
        </div>
    `;

    renderPopularityHistogram(data.distribution);

    setTimeout(() => {
        const out = document.getElementById("wsAnalyticsOutput");
        out.style.minHeight = "";
    }, 0);
}

function popTierCard(label, pct) {
    const safePct = (pct === undefined || pct === null) ? "—" : `${pct}%`;
    return `
        <div style="
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 12px;
            border-radius: 12px;
        ">
            <div style="opacity:0.75; font-size:13px;">${label}</div>
            <div style="font-size:22px; font-weight:700; margin-top:4px;">${safePct}</div>
        </div>
    `;
}

function getPopularityRead(stats) {
    // Simple, digestible insight (no academic fluff)
    const avg = stats.average_popularity ?? 0;
    const hitPct = stats.tier_percentages?.hit ?? 0;
    const undergroundPct = stats.tier_percentages?.underground ?? 0;

    if (hitPct >= 25) return "This selection skews mainstream (lots of high-performing tracks).";
    if (undergroundPct >= 40) return "This selection skews niche/underground (less globally popular tracks).";
    if (avg >= 60) return "Overall pretty popular — lots of tracks with strong listener reach.";
    if (avg >= 40) return "Mixed popularity — a blend of known tracks and deeper cuts.";
    return "Mostly deep cuts — lower overall Spotify popularity.";
}

function renderPopularityHistogram(values) {
    resetWsChart();

    // Buckets of 10 (0-9 ... 90-100)
    const bins = Array(10).fill(0);

    values.forEach(v => {
        const n = Number(v);
        if (!Number.isFinite(n)) return;
        const idx = Math.min(Math.floor(n / 10), 9);
        bins[idx]++;
    });

    const labels = [
        "0–9","10–19","20–29","30–39","40–49",
        "50–59","60–69","70–79","80–89","90–100"
    ];

    const ctx = document.getElementById("wsChart").getContext("2d");

    wsChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels,
            datasets: [{ data: bins }]
        },
        options: {
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        title: (items) => `Popularity ${items[0].label}`,
                        label: (item) => `${item.raw} tracks`
                    }
                }
            },
            scales: {
                y: { beginAtZero: true }
            }
        }
    });
}

        return;
    }

    out.innerHTML = `
        <div style="margin-bottom:24px;">
            <div style="font-size:14px; opacity:0.6;">Artist Diversity</div>
            <div style="font-size:42px; font-weight:700;">
                ${data.unique_artists}
            </div>
            <div style="opacity:0.7;">
                ${data.track_count} tracks • Density ${data.artist_density}
            </div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;">
            ${metricCard("Top Artist Share", data.dominance_pct + "%")}
            ${metricCard("Top 5 Share", data.concentration_pct + "%")}
            ${metricCard("Long Tail %", data.long_tail_pct + "%")}
        </div>

        <div style="position:relative; height:260px;">
            <canvas id="wsChart"></canvas>
        </div>
    `;

    resetWsChart();

    const labels = data.top_10.map(a => a.artist_name);
    const values = data.top_10.map(a => a.count);

    const ctx = document.getElementById("wsChart").getContext("2d");

    wsChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels,
            datasets: [{ data: values }]
        },
        options: {
            indexAxis: "y",
            plugins: { legend: { display: false } },
            scales: {
                x: { beginAtZero: true }
            }
        }
    });

    setTimeout(() => {
        const out = document.getElementById("wsAnalyticsOutput");
        out.style.minHeight = "";
    }, 0);
}

function renderReleaseYears(data) {

    const out = document.getElementById("wsAnalyticsOutput");

    if (!data || !data.year_counts) {
        out.innerHTML = `<p style="opacity:0.7;">No release data.</p>`;
        resetWsChart();
        return;
    }

    out.innerHTML = `
        <div style="margin-bottom:24px;">
            <div style="font-size:14px; opacity:0.6;">Release Span</div>
            <div style="font-size:42px; font-weight:700;">
                ${data.oldest_year}–${data.newest_year}
            </div>
            <div style="opacity:0.7;">
                Median ${data.median_year} • Span ${data.year_span} years
            </div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:18px;">
            ${metricCard("Tracks", data.track_count)}
            ${metricCard("Recency Score", data.recency_score)}
            ${metricCard("Decades", Object.keys(data.decade_counts).length)}
        </div>

        <div style="position:relative; height:260px;">
            <canvas id="wsChart"></canvas>
        </div>
    `;

    resetWsChart();

    const years = Object.keys(data.year_counts).map(Number).sort((a,b)=>a-b);
    const values = years.map(y => data.year_counts[y]);

    const ctx = document.getElementById("wsChart").getContext("2d");

    wsChartInstance = new Chart(ctx, {
        type: "bar",
        data: {
            labels: years,
            datasets: [{ data: values }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } }
        }
    });

    setTimeout(() => {
        const out = document.getElementById("wsAnalyticsOutput");
        out.style.minHeight = "";
    }, 0);
}

function getTimeCommitmentLabel(totalSeconds) {
    const hours = totalSeconds / 3600;

    if (hours < 1) return   "Quick Session";
    if (hours < 2) return   "Casual Listen";
    if (hours < 4) return   "Extended Play";
    if (hours < 8) return   "Work Day";
    if (hours < 16) return  "Weekend Bop";
    if (hours < 100) return "Serious Investment";
    if (hours < 400) return "Epic Journey";
    return                  "Year-Long Listen";
}

function getFlowDensityLabel(pct) {
    if (pct >= 60) return "Strong Flow";
    if (pct >= 40) return "Balanced Structure";
    return "Dynamic Structure";
}

function formatTotalRuntime(totalSeconds) {
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);

    if (hours === 0) return `${minutes} min`;
    return `${hours}h ${minutes}m`;
}

function getConsistencyLabel(stdDev) {
    if (stdDev < 30) {
        return { label: "Tight" };
    } else if (stdDev < 60) {
        return { label: "Balanced" };
    } else {
        return { label: "Wide Range" };
    }
}

function renderScatter(durations) {

    const points = durations.map((sec, i) => ({
        x: i + 1,
        y: sec
    }));

    const ctx = document.getElementById("wsChart").getContext("2d");

    new Chart(ctx, {
        type: "scatter",
        data: {
            datasets: [{
                data: points
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                x: {
                    title: { display: true, text: "Track Index" }
                },
                y: {
                    title: { display: true, text: "Length (seconds)" }
                }
            }
        }
    });
}

loadWorkspace();
</script>
