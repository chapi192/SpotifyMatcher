{% extends "base.html" %}

{% block body_class %}workspace-page{% endblock %}

{% block content %}

<!-- title -->
<div class="workspace-header">
    <h2>Your Analysis Workspace</h2>
</div>

<div class="ws-layout">

    <!-- left side -->
    <div class="ws-sidebar">

        <!-- metric tabs -->
        <div class="ws-controls-vertical">

            <button class="ws-metric-btn"
                    data-metric="avg-length"
                    onclick="setMetric('avg-length', this)">
                Average Length
            </button>

            <button class="ws-metric-btn"
                    data-metric="artist-frequency"
                    onclick="setMetric('artist-frequency', this)">
                Artist Frequency
            </button>

            <button class="ws-metric-btn"
                    data-metric="release-years"
                    onclick="setMetric('release-years', this)">
                Release Years
            </button>

            <button class="ws-metric-btn"
                    data-metric="playlist-profile"
                    onclick="setMetric('genres', this)">
                Genres
            </button>

        </div>

        <!-- spacing between scroll area and buttons -->
        <hr style="margin:10px 0; opacity:0.15;">

        <!-- playlist scroll section -->
        <div id="wsPlaylistSection"></div>

    </div>

    <!-- main/right side -->
    <div class="ws-main">
        <div class="ws-analytics">
            <div id="wsAnalyticsOutput" class="ws-analytics-inner">
                <p style="opacity:0.65; margin:0;">
                    Select a metric and playlist to begin.
                </p>
            </div>
        </div>
    </div>

</div>

<script type="module" src="{{ url_for('static', path='js/workspace/workspace.js') }}"></script>

{% endblock %}
